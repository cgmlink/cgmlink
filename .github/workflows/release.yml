name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]"

permissions:
  contents: read
  packages: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_VERSION: 10.0.x

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Set VERSION variable from tag
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$VERSION"
      - name: Build
        run: dotnet build src/cgm-link.sln --configuration Release /p:Version=$env:VERSION
      - name: Create private NuGet config
        shell: pwsh
        run: |
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="private-observability" value="${{ secrets.CGMLINK_NUGET_FEED_URL }}" />
            </packageSources>
            <packageSourceCredentials>
              <private-observability>
                <add key="Username" value="${{ github.actor }}" />
                <add key="ClearTextPassword" value="${{ secrets.GITHUB_TOKEN }}" />
              </private-observability>
            </packageSourceCredentials>
          </configuration>
          '@ | Set-Content -Path "$env:RUNNER_TEMP\private-observability.nuget.config"
      - name: Restore production observability variant
        run: >
          dotnet restore src/CgmLink.Api/CgmLink.Api.csproj
          --configfile $env:RUNNER_TEMP\private-observability.nuget.config
          /p:EnableSystemsObservability=true
      - name: Publish
        run: >
          dotnet publish src/CgmLink.Api/CgmLink.Api.csproj
          --configuration Release
          --runtime win-x86
          --no-restore
          /p:Version=$env:VERSION
          /p:EnableSystemsObservability=true
      - name: Test
        run: dotnet test src/cgm-link.sln --configuration Release /p:Version=$env:VERSION --no-build
      - name: Pack
        run: dotnet pack src/cgm-link.sln --configuration Release /p:Version=$env:VERSION --output .
      - name: Push
        run: dotnet nuget push *.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ secrets.NUGET_APIKEY }}
      - name: Deploy
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: src\CgmLink.Api\bin\Release\net10.0\win-x86\publish\
